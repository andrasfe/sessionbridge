<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>SessionBridge — agent browser</title>
  <link rel="stylesheet" href="/static/style.css" />
</head>
<body>
  <header>
    <h1>SessionBridge</h1>
    <p class="sub">Tell the agent what to do — it drives an isolated remote browser. Click or type in the view to take control (e.g. to solve a CAPTCHA).</p>
  </header>

  <main class="agent-layout">
    <section class="viewer-wrap">
      <form id="urlbar" class="urlbar">
        <input id="url" type="text" placeholder="Type a URL (e.g. expedia.com) and press Enter to navigate" disabled />
        <button id="go" type="submit" disabled>Go</button>
      </form>
      <div class="statusline">
        <span id="state" class="pill">starting…</span>
        <span id="host" class="host"></span>
      </div>
      <canvas id="viewer" width="1280" height="800" tabindex="0"></canvas>
    </section>

    <section class="chat">
      <div id="log" class="log"></div>
      <form id="chatform" class="chatform">
        <textarea id="task" rows="3" disabled
          placeholder="e.g. Go to expedia.com and find one-way flights from Cluj to London on July 5, then list the cheapest options"></textarea>
        <button id="send" type="submit" disabled>Send</button>
      </form>
    </section>
  </main>

  <script src="/static/app.js"></script>
</body>
</html>
