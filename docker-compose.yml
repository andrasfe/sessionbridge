# SessionBridge — local deployment that mirrors the AWS isolation boundaries.
#
# Networks:
#   edge      -> webapp <-> controlplane only.  Published to the host.
#   internal  -> controlplane <-> runner/llm/artifacts. `internal: true` means
#                NO route to/from the host. The runner publishes NO ports and
#                lives only here, so the web app (and the host) literally cannot
#                reach it. The control plane is the sole bridge.
#
# This is the docker-compose equivalent of: public ALB -> webapp/controlplane in
# public subnets, runner/llm/artifacts in private subnets with no public inbound.

services:
  webapp:
    build: { context: ., dockerfile: services/webapp/Dockerfile }
    environment:
      CONTROL_PLANE_URL: http://controlplane:8081
    ports:
      - "8080:8080"        # the ONLY port exposed to the user
    networks: [edge]
    depends_on: [controlplane]

  controlplane:
    build: { context: ., dockerfile: services/controlplane/Dockerfile }
    environment:
      RUNNER_URL: http://runner:8082
      LLM_URL: http://llm:8083
      ARTIFACT_URL: http://artifacts:8084
    networks: [edge, internal]
    depends_on: [runner, artifacts]

  runner:
    build: { context: ., dockerfile: services/runner/Dockerfile }
    environment:
      ARTIFACT_URL: http://artifacts:8084
      LLM_URL: http://llm:8083
      HEADLESS: "true"
    # No `ports:` — unreachable from host and from the edge network.
    networks: [internal]
    shm_size: "1gb"
    depends_on: [artifacts]

  llm:
    build: { context: ., dockerfile: services/llm/Dockerfile }
    environment:
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY:-}
      OPENROUTER_MODEL: ${OPENROUTER_MODEL:-openai/gpt-4o-mini}
    networks: [internal]

  artifacts:
    build: { context: ., dockerfile: services/artifacts/Dockerfile }
    environment:
      ARTIFACT_BACKEND: local
      METADATA_BACKEND: local
      ARTIFACT_LOCAL_DIR: /data/artifacts
      METADATA_LOCAL_DIR: /data/metadata
    volumes:
      - artifacts-data:/data
    networks: [internal]

networks:
  edge:
  internal:
    internal: true

volumes:
  artifacts-data:
