# SessionBridge — local deployment that mirrors the AWS isolation boundaries.
#
# Networks:
#   edge     -> webapp <-> controlplane only. Webapp is the only published port.
#   backend  -> controlplane <-> runner/llm/artifacts. The runner lives ONLY
#               here and publishes NO ports, so the web app (on `edge`) cannot
#               reach it and it isn't exposed to the host — the control plane is
#               the sole bridge. The network is intentionally NOT `internal:
#               true`: the runner still needs OUTBOUND internet to load
#               t-mobile.com. That's exactly the AWS model — a private subnet
#               with a NAT gateway: outbound allowed, public inbound denied
#               (there, by no public IP + a security group that only admits the
#               control plane).

services:
  webapp:
    build: { context: ., dockerfile: services/webapp/Dockerfile }
    environment:
      CONTROL_PLANE_URL: http://controlplane:8081
    ports:
      - "8080:8080"        # the ONLY port exposed to the user
    networks: [edge]
    depends_on: [controlplane]

  controlplane:
    build: { context: ., dockerfile: services/controlplane/Dockerfile }
    environment:
      RUNNER_URL: http://runner:8082
      LLM_URL: http://llm:8083
      ARTIFACT_URL: http://artifacts:8084
    networks: [edge, backend]
    depends_on: [runner, artifacts]

  runner:
    build: { context: ., dockerfile: services/runner/Dockerfile }
    environment:
      ARTIFACT_URL: http://artifacts:8084
      LLM_URL: http://llm:8083
      # Headed (under Xvfb) by default — real browsers fare better against bot
      # walls. Set RUNNER_HEADLESS=true for a lighter headless runner.
      HEADLESS: "${RUNNER_HEADLESS:-false}"
    # No `ports:` — unreachable from host and from the edge network.
    networks: [backend]
    shm_size: "1gb"
    depends_on: [artifacts]

  llm:
    build: { context: ., dockerfile: services/llm/Dockerfile }
    environment:
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY:-}
      OPENROUTER_MODEL: ${OPENROUTER_MODEL:-openai/gpt-4o-mini}
    networks: [backend]

  artifacts:
    build: { context: ., dockerfile: services/artifacts/Dockerfile }
    environment:
      ARTIFACT_BACKEND: local
      METADATA_BACKEND: local
      ARTIFACT_LOCAL_DIR: /data/artifacts
      METADATA_LOCAL_DIR: /data/metadata
    volumes:
      - artifacts-data:/data
    networks: [backend]

networks:
  edge:
  backend:

volumes:
  artifacts-data:
